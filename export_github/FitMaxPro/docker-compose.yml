version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: fitmaxpro-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - fitmaxpro-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitmaxpro-backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=fitmaxpro
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - fitmaxpro-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitmaxpro-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - fitmaxpro-network

volumes:
  mongodb_data:

networks:
  fitmaxpro-network:
    driver: bridge
